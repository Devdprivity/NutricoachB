version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    image: nuticoach-local:latest
    container_name: nuticoach-local
    restart: unless-stopped
    ports:
      - "8088:80"
    env_file:
      - .env.docker
    environment:
      DB_HOST: db
      DB_PORT: 5432
    depends_on:
      db:
        condition: service_healthy
    networks:
      - nuticoach-local

  db:
    image: postgres:15-alpine
    container_name: nuticoach-local-db
    environment:
      POSTGRES_DB: nutricoach
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: secret
    volumes:
      - nuticoach-local-db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - nuticoach-local

volumes:
  nuticoach-local-db:

networks:
  nuticoach-local:
    driver: bridge
